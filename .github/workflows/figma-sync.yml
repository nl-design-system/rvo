name: Figma sync check

on:
  pull_request:
    paths:
      - 'components/button/**'
      - 'packages/component-library-react/src/components/button/**'
      - 'tools/figma-sync/**'
      - '.github/workflows/figma-sync.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install ROOS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        env:
          STORYBOOK_REDUCED_MOTION: 1
        run: pnpm --filter @nl-rvo/storybook build

      - name: Serve Storybook
        run: |
          npx --yes http-server packages/storybook/dist -p 6006 -s &
          npx --yes wait-on http://localhost:6006

      - name: Install figma-sync dependencies
        working-directory: tools/figma-sync
        run: npm install

      - name: Install Playwright browsers
        working-directory: tools/figma-sync
        run: npx playwright install --with-deps chromium

      - name: Check FIGMA_TOKEN availability
        id: token
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          if [ -z "$FIGMA_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FIGMA_TOKEN secret is not set; skipping comparison."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run comparison
        if: steps.token.outputs.available == 'true'
        working-directory: tools/figma-sync
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node compare.mjs button

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-sync-output
          path: tools/figma-sync/output/
          if-no-files-found: ignore

      - name: Read result
        id: result
        if: steps.token.outputs.available == 'true'
        run: |
          RESULT_FILE=tools/figma-sync/output/button/result.json
          if [ ! -f "$RESULT_FILE" ]; then
            echo "passed=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PASSED=$(jq -r '.passed' "$RESULT_FILE")
          MIN_MATCH=$(jq -r '.minMatch' "$RESULT_FILE")
          FAILING=$(jq -r '[.variants[] | select(.passed == false) | .name] | join(", ")' "$RESULT_FILE")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "min_match=$MIN_MATCH" >> "$GITHUB_OUTPUT"
          echo "failing=$FAILING" >> "$GITHUB_OUTPUT"

      - name: Comment on PR (mismatch)
        if: steps.result.outputs.passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('tools/figma-sync/output/button/report.md', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Figma sync check — visuele check nodig',
              '',
              report,
              '',
              `[Diff-PNG en rapport downloaden](${runUrl})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Send mail (mismatch)
        if: steps.result.outputs.passed == 'false' && env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ vars.FIGMA_SYNC_MAIL_FROM }}
          MAIL_TO: ${{ vars.FIGMA_SYNC_MAIL_TO }}
          MIN_MATCH: ${{ steps.result.outputs.min_match }}
          FAILING: ${{ steps.result.outputs.failing }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          PCT=$(awk -v m="$MIN_MATCH" 'BEGIN { printf "%.2f", m * 100 }')
          PR_URL="$SERVER_URL/$REPO/pull/$PR_NUMBER"
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          FROM="${MAIL_FROM:-onboarding@resend.dev}"
          TO="${MAIL_TO:-designsystem@rvo.nl}"
          PAYLOAD=$(jq -n \
            --arg from "$FROM" \
            --arg to "$TO" \
            --arg subject "Figma sync: visuele check nodig (Button — laagste ${PCT}%)" \
            --arg text "Visuele check nodig voor het Button-component. Variant(en) onder drempel: ${FAILING}. Laagste match: ${PCT}%.\n\nPR: $PR_URL\nWorkflow run (incl. diff-PNG's): $RUN_URL" \
            '{from: $from, to: [$to], subject: $subject, text: $text}')
          curl -fsSL -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
